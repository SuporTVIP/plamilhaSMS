<!DOCTYPE html>
<html>

<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PramilhasVIP — Radar de Emissões">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PramilhaSVIP">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>PramilhaSVIP</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* 🚀 ESTÉTICA PURPLE LIGHT - IDENTIDADE 2026 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #F8F5FF;
      /* AppTheme.bg */
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #loading-screen {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #F8F5FF;
      /* AppTheme.bg */
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.5s ease-out;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Pontos agora são escuros no fundo claro */
    .dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(0, 0, 0, 0.04) 1.2px, transparent 1.2px);
      background-size: 28px 28px;
      z-index: 0;
    }

    /* Barras de Letterbox agora usam a cor de fundo */
    .letterbox {
      position: absolute;
      left: 0;
      right: 0;
      height: 80px;
      background: #F8F5FF;
      z-index: 1;
    }

    .letterbox.top {
      top: 0;
      animation: slideDown 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .letterbox.bottom {
      bottom: 0;
      animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
      }

      to {
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .center-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: scaleIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.82);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Glow Roxo Suave */
    .logo-container {
      width: 130px;
      /* Seguindo a recomendação de BOLD para Web */
      height: 130px;
      border-radius: 50%;
      background: rgba(106, 0, 255, 0.1);
      /* AppTheme.accent 10% */
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      animation: pulseGlow 1.8s ease-in-out infinite alternate;
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    @keyframes pulseGlow {
      0% {
        box-shadow: 0 0 10px rgba(106, 0, 255, 0.4), 0 0 20px rgba(0, 0, 0, 0.02);
      }

      100% {
        box-shadow: 0 0 40px rgba(106, 0, 255, 0.6), 0 0 80px rgba(0, 0, 0, 0.05);
      }
    }

    /* Tipografia Bold e Contraste Máximo */
    .brand {
      color: #000000;
      /* AppTheme.black */
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 6px;
      display: flex;
      align-items: baseline;
    }

    .brand span {
      color: #6A00FF;
      /* AppTheme.accent */
      font-weight: 900;
      /* BOLD TOTAL na Web */
      text-shadow: 0 0 25px rgba(106, 0, 255, 0.5);
    }

    .tagline {
      color: rgba(51, 51, 51, 0.6);
      /* AppTheme.text com opacidade */
      font-size: 13px;
      letter-spacing: 4px;
      font-weight: 700;
      margin-top: 10px;
    }

    /* Loader Line Roxo Elétrico */
    .vip-loader-line {
      width: 160px;
      height: 2px;
      background: #E8E0FF;
      /* AppTheme.border */
      margin-top: 36px;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }

    .vip-loader-line::after {
      content: "";
      position: absolute;
      left: -50%;
      top: 0;
      height: 100%;
      width: 40%;
      background: #6A00FF;
      /* AppTheme.accent */
      box-shadow: 0 0 15px #6A00FF;
      animation: sweepLine 1.5s ease-in-out infinite;
    }

    @keyframes sweepLine {
      0% {
        left: -50%;
      }

      100% {
        left: 100%;
      }
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <div class="dot-grid"></div>
    <div class="letterbox top"></div>
    <div class="letterbox bottom"></div>

    <div class="center-content">
      <div class="logo-container">
        <img src="icons/Icon-192.png" alt="Logo" onerror="this.style.display='none'">
      </div>
      <div class="brand">PRAMILHAS<span>VIP</span></div>
      <div class="tagline">RADAR DE EMISSÕES VIP</div>
      <div class="vip-loader-line"></div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('hidden');
        setTimeout(() => screen.remove(), 500);
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/firebase-messaging-sw.js', {
          updateViaCache: 'none'
        }).then(reg => {
          console.log('✅ Service Worker VIP pronto!');
          reg.update();
        });
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
