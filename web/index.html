<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PlamilhasVIP — Radar de Emissões">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PlamilhaSVIP">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>PlamilhaSVIP</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Tela de loading que aparece IMEDIATAMENTE enquanto o Flutter carrega */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0F172A;
      /* Mesmo AppTheme.bg do Flutter */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo-glow {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #1E293B;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-glow img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
    }

    .brand {
      color: white;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 6px;
    }

    .brand span {
      color: #38BDF8;
      font-weight: 300;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #1E293B;
      border-top-color: #38BDF8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
      }

      50% {
        box-shadow: 0 0 40px rgba(56, 189, 248, 0.7);
      }
    }
  </style>
</head>

<body>

  <!-- Aparece IMEDIATAMENTE. O Flutter o remove quando estiver pronto. -->
  <div id="loading-screen">
    <div class="logo-glow">
      <img src="icons/Icon-192.png" alt="Logo" onerror="this.style.display='none'">
    </div>
    <div class="brand">PLAMILHAS<span>VIP</span></div>
    <div class="spinner"></div>
  </div>

  <script>
    // Remove a tela de loading quando o Flutter terminar de montar
    window.addEventListener('flutter-first-frame', function () {
      const screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('hidden');
        setTimeout(() => screen.remove(), 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
